name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
      - codex/**
  pull_request:

jobs:
  test:
    name: Fresh Env Tests
    runs-on: ubuntu-latest
    outputs:
      verification_summary: ${{ steps.run_tests.outputs.verification_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=69"
          pip install -r requirements.txt
          pip install -e . --no-deps --no-build-isolation

      - name: Run Tests
        id: run_tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q | tee pytest.log
          verification_summary="$(tail -n 1 pytest.log)"
          echo "verification_summary=$verification_summary" >> "$GITHUB_OUTPUT"

  fixture-smoke:
    name: Offline Fixture Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=69"
          pip install -r requirements.txt
          pip install -e . --no-deps --no-build-isolation

      - name: Run Offline Fixture Validation
        run: pytest -q tests/test_offline_demo_pack.py tests/test_intake_validation.py

  release-scorecard:
    name: Release Scorecard Artifact
    runs-on: ubuntu-latest
    needs:
      - test
      - fixture-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=69"
          pip install -r requirements.txt
          pip install -e . --no-deps --no-build-isolation

      - name: Generate Release Scorecard Artifact
        shell: bash
        env:
          VERIFICATION_SUMMARY: ${{ needs.test.outputs.verification_summary }}
          CANDIDATE: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python -m war_room.release_scorecard \
            --candidate "$CANDIDATE" \
            --verification-summary "$VERIFICATION_SUMMARY"

      - name: Upload Release Scorecard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-scorecard-${{ github.run_id }}
          path: runs/release_scorecards/
          if-no-files-found: error
